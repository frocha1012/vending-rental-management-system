<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta — Vending Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/portal.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card auth-wide">
        <div class="auth-brand">
            <span class="brand-mark"><i class="bi bi-cup-hot-fill"></i></span>
            <h1>Criar Conta</h1>
            <p>Pedido de criação de conta de cliente</p>
        </div>

        <!-- Success -->
        <div th:if="${sucesso}" class="alert alert-success" role="alert">
            <strong><i class="bi bi-check-circle-fill me-1"></i>Pedido submetido com sucesso!</strong><br>
            O seu pedido foi registado e está a aguardar aprovação pela nossa equipa.
            Será contactado assim que a conta for ativada.
            <div class="mt-3 text-center">
                <a href="/login" class="btn btn-outline-primary btn-sm">Voltar ao login</a>
            </div>
        </div>

        <!-- Error -->
        <div th:if="${erro}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-1"></i><span th:text="${erro}"></span>
        </div>

        <!-- Form (hidden after success) -->
        <form th:unless="${sucesso}" method="post" action="/register">

            <div class="form-section-title">Dados pessoais</div>

            <div class="mb-3">
                <label class="form-label">Nome completo <span class="text-danger">*</span></label>
                <input class="form-control" type="text" name="nome"
                       th:value="${nome}" required autofocus maxlength="200">
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">NIF <span class="text-danger">*</span></label>
                    <input class="form-control" type="text" name="nif"
                           th:value="${nif}" required maxlength="20" placeholder="ex: 500100200">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <input class="form-control" type="email" name="email"
                           th:value="${email}" required maxlength="150">
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">Telefone</label>
                    <input class="form-control" type="text" name="telefone"
                           th:value="${telefone}" maxlength="20">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Morada</label>
                    <input class="form-control" type="text" name="morada"
                           th:value="${morada}" maxlength="300">
                </div>
            </div>

            <div class="form-section-title">Credenciais de acesso</div>

            <div class="mb-3">
                <label class="form-label">Username <span class="text-danger">*</span></label>
                <input class="form-control" type="text" name="username"
                       th:value="${username}" required maxlength="50"
                       autocomplete="username">
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Password <span class="text-danger">*</span></label>
                    <input class="form-control" type="password" name="password"
                           required autocomplete="new-password">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Confirmar password <span class="text-danger">*</span></label>
                    <input class="form-control" type="password" name="confirmPassword"
                           required autocomplete="new-password">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-send me-1"></i> Submeter pedido
            </button>

            <div class="text-center mt-3">
                <a href="/login" class="text-muted small text-decoration-none">Já tem conta? Iniciar sessão</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
