<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Contratos</title>
</head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Contratos</h1>
        <a class="btn btn-primary" href="/contratos/novo">Novo Contrato</a>
    </div>

    <div th:if="${sucesso}" class="alert alert-success" role="alert" th:text="${sucesso}"></div>
    <div th:if="${erro}" class="alert alert-danger" role="alert" th:text="${erro}"></div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Vending Machine</th>
            <th>Data Inicio</th>
            <th>Data Fim</th>
            <th>Valor Mensal</th>
            <th>Estado</th>
            <th>Acoes</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="contrato : ${contratos}">
            <td th:text="${contrato.id}"></td>
            <td th:text="${contrato.cliente.nome}"></td>
            <td th:text="${contrato.vendingMachine.codigo}"></td>
            <td th:text="${contrato.dataInicio}"></td>
            <td th:text="${contrato.dataFim}"></td>
            <td th:text="${contrato.valorMensal}"></td>
            <td th:text="${contrato.estado}"></td>
            <td>
                <a class="btn btn-sm btn-secondary" th:href="@{/contratos/{id}/editar(id=${contrato.id})}">Editar</a>
                <form th:action="@{/contratos/{id}/eliminar(id=${contrato.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-danger"
                            onclick="return confirm('Eliminar este contrato?')">Eliminar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
