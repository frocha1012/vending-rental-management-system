<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Client Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/portal">Vending Rental — Client Portal</a>
        <div class="navbar-nav me-auto">
            <a class="nav-link" href="/portal">Dashboard</a>
            <a class="nav-link" href="/portal/dados">Os meus dados</a>
            <a class="nav-link" href="/portal/propostas">Propostas</a>
            <a class="nav-link" href="/portal/contratos">Contratos</a>
            <a class="nav-link" href="/portal/instalacoes">Instalações</a>
        </div>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text text-white me-3"
                  th:text="${session.clienteNome}"></span>
            <a class="nav-link text-white" href="/logout">Terminar sessão</a>
        </div>
    </div>
</nav>

<main class="container" th:insert="${content}">
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
