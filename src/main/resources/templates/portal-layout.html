<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Client Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/portal.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">

    <!-- ── Sidebar (static on desktop, offcanvas on mobile) ──────────────── -->
    <aside class="app-sidebar offcanvas-lg offcanvas-start" tabindex="-1" id="sidebar">
        <a class="sidebar-brand" href="/portal">
            <span class="brand-mark"><i class="bi bi-cup-hot-fill"></i></span>
            <span>
                Vending Rental
                <small>Portal do Cliente</small>
            </span>
        </a>

        <div class="sidebar-section">Menu</div>
        <nav class="sidebar-nav" id="sidebarNav">
            <a class="nav-link" href="/portal" data-exact="true">
                <i class="bi bi-grid-1x2-fill"></i> Dashboard
            </a>
            <a class="nav-link" href="/portal/dados">
                <i class="bi bi-person-vcard-fill"></i> Os meus dados
            </a>
            <a class="nav-link" href="/portal/propostas">
                <i class="bi bi-file-earmark-text-fill"></i> Propostas
            </a>
            <a class="nav-link" href="/portal/contratos">
                <i class="bi bi-file-earmark-check-fill"></i> Contratos
            </a>
            <a class="nav-link" href="/portal/instalacoes">
                <i class="bi bi-tools"></i> Instalações
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-user">
                <span class="avatar" th:text="${session.clienteNome != null ? #strings.substring(session.clienteNome,0,1) : 'C'}">C</span>
                <div>
                    <div class="u-name" th:text="${session.clienteNome}">Cliente</div>
                    <div class="u-role">Cliente</div>
                </div>
            </div>
            <a href="/logout" class="nav-link mt-2">
                <i class="bi bi-box-arrow-right"></i> Sair
            </a>
        </div>
    </aside>

    <!-- ── Main column ───────────────────────────────────────────────────── -->
    <div class="app-main">
        <header class="app-topbar">
            <button class="topbar-toggle" type="button"
                    data-bs-toggle="offcanvas" data-bs-target="#sidebar" aria-label="Menu">
                <i class="bi bi-list"></i>
            </button>
            <h1 class="page-title" id="pageTitle">Portal</h1>
            <span class="topbar-spacer"></span>
            <span class="d-none d-sm-inline text-muted small me-2" th:text="${session.clienteNome}"></span>
            <span class="avatar" th:text="${session.clienteNome != null ? #strings.substring(session.clienteNome,0,1) : 'C'}">C</span>
        </header>

        <main class="app-content" th:insert="${content}"></main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function () {
        // Active sidebar link based on the current path
        var path = window.location.pathname;
        document.querySelectorAll('#sidebarNav .nav-link').forEach(function (a) {
            var href = a.getAttribute('href');
            var exact = a.getAttribute('data-exact') === 'true';
            if ((exact && path === href) || (!exact && path.indexOf(href) === 0)) {
                a.classList.add('active');
            }
        });
        // Topbar title from the document title (strip any " — ..." suffix)
        var t = (document.title || 'Portal').split('—')[0].split('|')[0].trim();
        var el = document.getElementById('pageTitle');
        if (el && t) { el.textContent = t; }
    })();
</script>
</body>
</html>
