<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Instalacoes</title>
</head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Instalacoes</h1>
        <a class="btn btn-primary" href="/instalacoes/novo">Nova Instalacao</a>
    </div>

    <div th:if="${sucesso}" class="alert alert-success" role="alert" th:text="${sucesso}"></div>
    <div th:if="${erro}" class="alert alert-danger" role="alert" th:text="${erro}"></div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Contrato</th>
            <th>Cliente</th>
            <th>Data Instalacao</th>
            <th>Local</th>
            <th>Estado</th>
            <th>Observacoes</th>
            <th>Acoes</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="instalacao : ${instalacoes}">
            <td th:text="${instalacao.id}"></td>
            <td th:text="${'#' + instalacao.contrato.id}"></td>
            <td th:text="${instalacao.contrato.cliente.nome}"></td>
            <td th:text="${instalacao.dataInstalacao}"></td>
            <td th:text="${instalacao.localInstalacao}"></td>
            <td th:text="${instalacao.estado}"></td>
            <td th:text="${instalacao.observacoes}"></td>
            <td>
                <a class="btn btn-sm btn-secondary"
                   th:href="@{/instalacoes/{id}/editar(id=${instalacao.id})}">Editar</a>
                <form th:action="@{/instalacoes/{id}/eliminar(id=${instalacao.id})}"
                      method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-danger"
                            onclick="return confirm('Eliminar esta instalacao?')">Eliminar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
