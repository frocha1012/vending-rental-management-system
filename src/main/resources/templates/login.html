<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Vending Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/portal.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card auth-narrow">
        <div class="auth-brand">
            <span class="brand-mark"><i class="bi bi-cup-hot-fill"></i></span>
            <h1>Vending Rental</h1>
            <p>Portal do Cliente</p>
        </div>

        <div th:if="${param.resetSuccess}" class="alert alert-success" role="alert">
            <i class="bi bi-check-circle-fill me-1"></i>
            Password redefinida com sucesso. Pode iniciar sessão.
        </div>

        <div th:if="${erro}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-1"></i><span th:text="${erro}"></span>
        </div>

        <form method="post" action="/login">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input class="form-control" type="text" name="username" required autofocus>
            </div>
            <div class="mb-2">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" required>
            </div>
            <div class="text-end mb-3">
                <a href="/forgot-password" class="small text-decoration-none">Esqueci-me da password</a>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
            </button>
        </form>

        <div class="auth-divider">ou</div>

        <div class="text-center">
            <span class="text-muted small">Ainda não tem conta?</span>
            <a href="/register" class="small ms-1 text-decoration-none fw-semibold">Criar conta</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
