<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title th:text="${proposta.id != null} ? 'Editar Proposta' : 'Nova Proposta'">Proposta</title>
</head>
<body>
<main>
    <h1 th:text="${proposta.id != null} ? 'Editar Proposta' : 'Nova Proposta'">Proposta</h1>

    <form th:action="@{/propostas/guardar}" th:object="${proposta}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label class="form-label">Cliente</label>
            <select class="form-select" th:field="*{cliente.id}" required>
                <option value="">-- Selecionar --</option>
                <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nome}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Vending Machine</label>
            <select class="form-select" th:field="*{vendingMachine.id}" required>
                <option value="">-- Selecionar --</option>
                <option th:each="vm : ${vendingMachines}" th:value="${vm.id}"
                        th:text="${vm.codigo + ' - ' + vm.modelo}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Data Proposta</label>
            <input class="form-control" type="date" th:field="*{dataProposta}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Valor Proposto</label>
            <input class="form-control" type="number" step="0.01" th:field="*{valorProposto}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Estado</label>
            <select class="form-select" th:field="*{estado}">
                <option th:each="estado : ${estados}" th:value="${estado}" th:text="${estado}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Observacoes</label>
            <textarea class="form-control" th:field="*{observacoes}" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a class="btn btn-secondary" href="/propostas">Cancelar</a>
    </form>
</main>
</body>
</html>
