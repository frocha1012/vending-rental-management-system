<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title th:text="${vendingMachine.id != null} ? 'Editar Vending Machine' : 'Nova Vending Machine'">Vending Machine</title>
</head>
<body>
<main>
    <h1 th:text="${vendingMachine.id != null} ? 'Editar Vending Machine' : 'Nova Vending Machine'">Vending Machine</h1>

    <form th:action="@{/vending-machines/guardar}" th:object="${vendingMachine}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label class="form-label">Codigo</label>
            <input class="form-control" type="text" th:field="*{codigo}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Modelo</label>
            <input class="form-control" type="text" th:field="*{modelo}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Localizacao</label>
            <input class="form-control" type="text" th:field="*{localizacao}">
        </div>

        <div class="mb-3">
            <label class="form-label">Estado</label>
            <select class="form-select" th:field="*{estado}">
                <option th:each="estado : ${estados}" th:value="${estado}" th:text="${estado}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Preco Aluguer Mensal</label>
            <input class="form-control" type="number" step="0.01" th:field="*{precoAluguerMensal}" required>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a class="btn btn-secondary" href="/vending-machines">Cancelar</a>
    </form>
</main>
</body>
</html>
