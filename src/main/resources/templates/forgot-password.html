<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar password — Vending Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/portal.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card auth-narrow">
        <div class="auth-brand">
            <span class="brand-mark"><i class="bi bi-key-fill"></i></span>
            <h1>Recuperar password</h1>
            <p>Enviamos-lhe um link de redefinição</p>
        </div>

        <!-- Generic success — always shown regardless of whether account exists -->
        <div th:if="${enviado}" class="alert alert-success" role="alert">
            <i class="bi bi-envelope-check-fill me-1"></i>
            Se os dados introduzidos correspondem a uma conta ativa, receberá um email
            com um link para redefinir a sua password. Verifique também a caixa de spam.
            <div class="mt-3 text-center">
                <a href="/login" class="btn btn-outline-primary btn-sm">Voltar ao login</a>
            </div>
        </div>

        <form th:unless="${enviado}" method="post" action="/forgot-password">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input class="form-control" type="text" name="username"
                       required autofocus autocomplete="username">
            </div>
            <div class="mb-4">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" name="email"
                       required autocomplete="email">
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-send me-1"></i> Enviar link de reset
            </button>

            <div class="text-center mt-3">
                <a href="/login" class="text-muted small text-decoration-none">Voltar ao login</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
