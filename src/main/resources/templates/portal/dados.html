<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{portal-layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Os meus dados</title>
</head>
<body>
<main>
    <div class="section-head">
        <h5 class="fw-bold">Os meus dados</h5>
    </div>

    <!-- ── Alerts ──────────────────────────────────────────────────────────── -->
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-1"></i><span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i><span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">

        <!-- ── Left: read-only profile ───────────────────────────────────── -->
        <div class="col-lg-5">
            <div class="surface-card h-100">
                <div class="surface-card-header"><i class="bi bi-person-badge me-2"></i>Perfil</div>
                <div class="card-pad">
                    <dl class="row mb-0">
                        <dt class="col-sm-5">Nome</dt>
                        <dd class="col-sm-7" th:text="${cliente.nome}"></dd>

                        <dt class="col-sm-5">NIF</dt>
                        <dd class="col-sm-7" th:text="${cliente.nif}"></dd>

                        <dt class="col-sm-5">Estado</dt>
                        <dd class="col-sm-7">
                            <span class="status-badge"
                                  th:classappend="${cliente.estado.name() == 'ATIVO'} ? 'status-success' : 'status-neutral'"
                                  th:text="${cliente.estado}"></span>
                        </dd>

                        <dt class="col-sm-5">Username portal</dt>
                        <dd class="col-sm-7" th:text="${cliente.username != null ? cliente.username : '—'}"></dd>

                        <dt class="col-sm-5">Data de registo</dt>
                        <dd class="col-sm-7" th:text="${cliente.dataRegisto}"></dd>

                        <div class="col-12"><hr class="my-3"></div>

                        <dt class="col-sm-5">Email</dt>
                        <dd class="col-sm-7" th:text="${cliente.email}"></dd>

                        <dt class="col-sm-5">Telefone</dt>
                        <dd class="col-sm-7"
                            th:text="${cliente.telefone != null ? cliente.telefone : '—'}"></dd>

                        <dt class="col-sm-5">Morada</dt>
                        <dd class="col-sm-7"
                            th:text="${cliente.morada != null ? cliente.morada : '—'}"></dd>
                    </dl>
                </div>
                <div class="card-pad pt-0">
                    <div class="form-text">
                        <i class="bi bi-info-circle me-1"></i>
                        Nome, NIF e estado só podem ser alterados pelo gestor.
                    </div>
                </div>
            </div>
        </div>

        <!-- ── Right: edit form ──────────────────────────────────────────── -->
        <div class="col-lg-7">
            <div class="surface-card">
                <div class="surface-card-header"><i class="bi bi-pencil-square me-2"></i>Editar dados de contacto</div>
                <div class="card-pad">
                    <form th:action="@{/portal/dados/editar}" method="post" novalidate>

                        <div class="mb-3">
                            <label for="email" class="form-label">
                                Email <span class="text-danger">*</span>
                            </label>
                            <input type="email" id="email" name="email" class="form-control"
                                   th:value="${cliente.email}" required>
                        </div>

                        <div class="mb-3">
                            <label for="telefone" class="form-label">Telefone</label>
                            <input type="tel" id="telefone" name="telefone" class="form-control"
                                   th:value="${cliente.telefone}" placeholder="Ex: 912 345 678">
                        </div>

                        <div class="mb-3">
                            <label for="morada" class="form-label">Morada</label>
                            <input type="text" id="morada" name="morada" class="form-control"
                                   th:value="${cliente.morada}" placeholder="Rua, número, localidade">
                        </div>

                        <div class="form-section-title">Alterar password do portal</div>
                        <div class="form-text mb-3">
                            <i class="bi bi-info-circle me-1"></i>
                            Deixe todos os campos em branco para não alterar a password.
                        </div>

                        <div class="mb-3">
                            <label for="passwordAtual" class="form-label">Password atual</label>
                            <input type="password" id="passwordAtual" name="passwordAtual"
                                   class="form-control" autocomplete="current-password"
                                   placeholder="Obrigatória para alterar a password">
                        </div>

                        <div class="mb-3">
                            <label for="novaPassword" class="form-label">Nova password</label>
                            <input type="password" id="novaPassword" name="novaPassword"
                                   class="form-control" autocomplete="new-password">
                        </div>

                        <div class="mb-1">
                            <label for="confirmarPassword" class="form-label">Confirmar nova password</label>
                            <input type="password" id="confirmarPassword" name="confirmarPassword"
                                   class="form-control" autocomplete="new-password">
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i> Guardar alterações
                            </button>
                            <a href="/portal" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div><!-- /row -->
</main>
</body>
</html>
