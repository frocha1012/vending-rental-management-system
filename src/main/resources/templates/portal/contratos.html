<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{portal-layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Os meus Contratos</title>
</head>
<body>
<main>
    <h1 class="mb-4">Os meus Contratos</h1>

    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${#lists.isEmpty(contratos)}" class="alert alert-info">
        Não tem contratos registados.
    </div>

    <table th:unless="${#lists.isEmpty(contratos)}" class="table table-striped align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>Vending Machine</th>
            <th>Data Início</th>
            <th>Data Fim</th>
            <th>Valor Mensal</th>
            <th>Estado</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="contrato : ${contratos}">
            <td th:text="${contrato.id}"></td>
            <td th:text="${contrato.vendingMachine.codigo + ' — ' + contrato.vendingMachine.modelo}"></td>
            <td th:text="${contrato.dataInicio}"></td>
            <td th:text="${contrato.dataFim}"></td>
            <td th:text="${contrato.valorMensal + ' €'}"></td>
            <td>
                <span class="badge"
                      th:classappend="${contrato.estado == ATIVO} ? 'bg-success' : 'bg-secondary'"
                      th:text="${contrato.estado}"></span>
            </td>
            <td>
                <!-- Active contract with no pending request: show button -->
                <a th:if="${contrato.estado == ATIVO and !comPedidoPendente.contains(contrato.id)}"
                   th:href="@{/portal/contratos/{id}/rescisao(id=${contrato.id})}"
                   class="btn btn-sm btn-outline-danger">
                    Pedir Rescisão
                </a>
                <!-- Active contract already has pending request -->
                <span th:if="${contrato.estado == ATIVO and comPedidoPendente.contains(contrato.id)}"
                      class="badge bg-warning text-dark">Pedido Pendente</span>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
