<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir password — Vending Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/portal.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card auth-narrow">
        <div class="auth-brand">
            <span class="brand-mark"><i class="bi bi-shield-lock-fill"></i></span>
            <h1>Redefinir password</h1>
            <p>Escolha uma nova password de acesso</p>
        </div>

        <!-- Invalid / expired token -->
        <div th:if="${erroToken}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-1"></i><span th:text="${erroToken}"></span>
            <div class="mt-3 text-center">
                <a href="/forgot-password" class="btn btn-outline-danger btn-sm">Solicitar novo link</a>
            </div>
        </div>

        <!-- Validation error (passwords don't match, etc.) -->
        <div th:if="${erro}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-1"></i><span th:text="${erro}"></span>
        </div>

        <!-- Reset form — only shown when token is valid -->
        <form th:if="${token}" method="post" action="/reset-password">
            <input type="hidden" name="token" th:value="${token}">

            <div class="mb-3">
                <label class="form-label">Nova password</label>
                <input class="form-control" type="password" name="newPassword"
                       required autofocus autocomplete="new-password">
            </div>
            <div class="mb-4">
                <label class="form-label">Confirmar nova password</label>
                <input class="form-control" type="password" name="confirmPassword"
                       required autocomplete="new-password">
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-check-lg me-1"></i> Redefinir password
            </button>
        </form>

        <div th:if="${erroToken == null and token == null}" class="text-center mt-3">
            <a href="/forgot-password" class="text-muted small text-decoration-none">Solicitar novo link</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
